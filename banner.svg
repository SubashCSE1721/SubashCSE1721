<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Subash M — Senior .NET Developer</title>
  <desc>Animated banner for Subash M, Senior .NET Developer specialising in Healthcare IT Automation</desc>

  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e4fc4" stroke-width="0.4" opacity="0.35"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Radial gradients for orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e4fc4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e4fc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f9eff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f9eff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for whole banner -->
    <clipPath id="banner-clip">
      <rect width="900" height="320" rx="12"/>
    </clipPath>

    <!-- Shimmer gradient -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4f9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Base background ── -->
  <g clip-path="url(#banner-clip)">
    <rect width="900" height="320" fill="#0a1628"/>

    <!-- Grid -->
    <rect width="900" height="320" fill="url(#grid)">
      <animate attributeName="opacity" values="0;0.7;0.7" dur="1.8s" fill="freeze"/>
    </rect>

    <!-- Fade mask on grid edges -->
    <rect fill="url(#orb1)" x="-60" y="-60" width="500" height="500">
      <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -12;0 0" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect width="300" height="300" fill="url(#orb2)" x="580" y="10">
      <animate attributeName="opacity" values="0;1" dur="2.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 10;0 0" dur="11s" repeatCount="indefinite"/>
    </rect>
    <rect width="260" height="260" fill="url(#orb3)" x="100" y="120">
      <animate attributeName="opacity" values="0;1" dur="3s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;8 -8;0 0" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Floating particles ── -->
    <!-- p1 -->
    <circle r="2" fill="#4f9eff" opacity="0">
      <animate attributeName="cx" values="120;115;120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;52;60" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <!-- p2 -->
    <circle r="1.5" fill="#00d4ff" opacity="0">
      <animate attributeName="cx" values="780;784;780" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;70;80" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- p3 -->
    <circle r="2.5" fill="#4f9eff" opacity="0">
      <animate attributeName="cx" values="680;675;680" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;232;240" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="6s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <!-- p4 -->
    <circle r="1" fill="#ffffff" opacity="0">
      <animate attributeName="cx" values="200;204;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="270;262;270" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <!-- p5 -->
    <circle r="1.5" fill="#00d4ff" opacity="0">
      <animate attributeName="cx" values="820;815;820" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;192;200" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0" dur="7s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <!-- p6 -->
    <circle r="2" fill="#4f9eff" opacity="0">
      <animate attributeName="cx" values="50;55;50" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;170;180" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0" dur="8s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- p7 -->
    <circle r="1" fill="#ffffff" opacity="0">
      <animate attributeName="cx" values="550;554;550" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30;22;30" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.35;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <!-- p8 -->
    <circle r="3" fill="#1e4fc4" opacity="0">
      <animate attributeName="cx" values="860;854;860" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="290;280;290" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" begin="4s" repeatCount="indefinite"/>
    </circle>

    <!-- ── Horizontal scan line ── -->
    <rect x="0" y="0" width="900" height="1.5" fill="url(#shimmer)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0 -2;0 322;0 -2" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Top border accent ── -->
    <rect x="0" y="0" width="900" height="2" fill="none">
      <animate attributeName="fill" values="#0a1628;#4f9eff;#0a1628" dur="0.1s" begin="0.6s" fill="freeze"/>
    </rect>
    <rect x="0" y="0" width="0" height="2" fill="#4f9eff" filter="url(#glow-soft)">
      <animate attributeName="width" values="0;900" dur="1.1s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="0" y="318" width="0" height="2" fill="#1e4fc4">
      <animate attributeName="width" values="0;900" dur="1.1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- ── Code snippet (right side background) ── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.28" dur="1s" begin="1.4s" fill="freeze"/>
      <text x="530" y="78" font-family="'Courier New', monospace" font-size="11" fill="#4f9eff">var subash = new Developer</text>
      <text x="530" y="96" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">{</text>
      <text x="548" y="112" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Role = <tspan fill="#00d4ff">"Senior .NET Dev"</tspan>,</text>
      <text x="548" y="128" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Domain = <tspan fill="#00d4ff">"Healthcare IT"</tspan>,</text>
      <text x="548" y="144" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Years = <tspan fill="#f8c55a">5</tspan>,</text>
      <text x="548" y="160" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Tools = <tspan fill="#f8c55a">12</tspan>,</text>
      <text x="548" y="176" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Impact = <tspan fill="#00d4ff">"~90% effort saved"</tspan>,</text>
      <text x="548" y="192" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">Status = <tspan fill="#00d084">"Open to work"</tspan></text>
      <text x="530" y="208" font-family="'Courier New', monospace" font-size="11" fill="#8a9ab8">};</text>
    </g>

    <!-- ── Vertical divider ── -->
    <line x1="510" y1="40" x2="510" y2="280" stroke="#1e4fc4" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.4" dur="0.5s" begin="1.2s" fill="freeze"/>
    </line>

    <!-- ── Status badge (top-left) ── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
      <rect x="40" y="36" width="156" height="22" rx="11" fill="#00d0840d" stroke="#00d084" stroke-width="0.8"/>
      <circle cx="56" cy="47" r="4" fill="#00d084">
        <animate attributeName="r" values="4;3;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="66" y="51.5" font-family="'Courier New', monospace" font-size="10.5" fill="#00d084" font-weight="500">Open to Opportunities</text>
    </g>

    <!-- ── Main name — letter by letter appear ── -->
    <!-- "Subash M" revealed via clipPath growing width -->
    <g filter="url(#glow-text)">
      <text x="40" y="130" font-family="'Arial Black', Arial, sans-serif" font-size="62" font-weight="900" fill="#f8faff" letter-spacing="-2" opacity="0">
        Subash M
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.65s" fill="freeze"/>
        <animate attributeName="x" values="30;40" dur="0.5s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </text>
    </g>

    <!-- ── Subtitle — slide in ── -->
    <text x="40" y="158" font-family="'Courier New', monospace" font-size="13.5" fill="#4f9eff" font-weight="400" opacity="0">
      Senior .NET Developer
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
      <animate attributeName="x" values="20;40" dur="0.5s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
    </text>

    <!-- ── Tagline ── -->
    <text x="40" y="180" font-family="Arial, sans-serif" font-size="12" fill="#8a9ab8" font-weight="300" opacity="0">
      Healthcare IT Automation  ·  Chennai, Tamil Nadu
      <animate attributeName="opacity" values="0;0.85" dur="0.5s" begin="1.3s" fill="freeze"/>
    </text>

    <!-- ── Accent line under name ── -->
    <rect x="40" y="165" width="0" height="2" rx="1" fill="#4f9eff" filter="url(#glow-soft)">
      <animate attributeName="width" values="0;220" dur="0.6s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- ── Stats row ── -->
    <!-- Stat 1: 12+ tools -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.55s" fill="freeze"/>
      <rect x="40" y="204" width="95" height="58" rx="8" fill="#ffffff08" stroke="#1e4fc4" stroke-width="0.6"/>
      <text x="87" y="228" font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#f8faff" text-anchor="middle">12<tspan fill="#4f9eff" font-size="16">+</tspan></text>
      <text x="87" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#8a9ab8" text-anchor="middle">tools shipped</text>
    </g>
    <!-- Stat 2: ~90% -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.72s" fill="freeze"/>
      <rect x="145" y="204" width="95" height="58" rx="8" fill="#ffffff08" stroke="#1e4fc4" stroke-width="0.6"/>
      <text x="192" y="228" font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#f8faff" text-anchor="middle">~90<tspan fill="#4f9eff" font-size="16">%</tspan></text>
      <text x="192" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#8a9ab8" text-anchor="middle">effort saved</text>
    </g>
    <!-- Stat 3: 5 yrs -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.89s" fill="freeze"/>
      <rect x="250" y="204" width="95" height="58" rx="8" fill="#ffffff08" stroke="#1e4fc4" stroke-width="0.6"/>
      <text x="297" y="228" font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#f8faff" text-anchor="middle">~5<tspan fill="#4f9eff" font-size="14"> yrs</tspan></text>
      <text x="297" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#8a9ab8" text-anchor="middle">experience</text>
    </g>
    <!-- Stat 4: 95%+ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.06s" fill="freeze"/>
      <rect x="355" y="204" width="95" height="58" rx="8" fill="#ffffff08" stroke="#1e4fc4" stroke-width="0.6"/>
      <text x="402" y="228" font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#f8faff" text-anchor="middle">95<tspan fill="#4f9eff" font-size="14">%+</tspan></text>
      <text x="402" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#8a9ab8" text-anchor="middle">test coverage</text>
    </g>

    <!-- ── Tech pills row ── -->
    <!-- C# pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
      <rect x="40" y="278" width="42" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="61" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">C#</text>
    </g>
    <!-- .NET pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
      <rect x="90" y="278" width="48" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="114" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">.NET</text>
    </g>
    <!-- MySQL pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.4s" fill="freeze"/>
      <rect x="146" y="278" width="50" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="171" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">MySQL</text>
    </g>
    <!-- Azure pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
      <rect x="204" y="278" width="48" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="228" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">Azure</text>
    </g>
    <!-- Selenium pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>
      <rect x="260" y="278" width="60" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="290" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">Selenium</text>
    </g>
    <!-- Python pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.7s" fill="freeze"/>
      <rect x="328" y="278" width="52" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="354" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">Python</text>
    </g>
    <!-- CI/CD pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.8s" fill="freeze"/>
      <rect x="388" y="278" width="44" height="20" rx="10" fill="#1e4fc408" stroke="#1e4fc4" stroke-width="0.7"/>
      <text x="410" y="292" font-family="'Courier New', monospace" font-size="9.5" fill="#4f9eff" text-anchor="middle">CI/CD</text>
    </g>

    <!-- ── Cursor blink on name ── -->
    <rect x="374" y="90" width="3.5" height="48" rx="1" fill="#4f9eff" filter="url(#glow-soft)">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="1.2s" begin="0.65s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Corner decorations ── -->
    <!-- top-right corner bracket -->
    <g stroke="#1e4fc4" stroke-width="1.2" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.55" dur="0.5s" begin="0.9s" fill="freeze"/>
      <path d="M858 18 L878 18 L878 38"/>
    </g>
    <!-- bottom-left corner bracket -->
    <g stroke="#1e4fc4" stroke-width="1.2" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.55" dur="0.5s" begin="1s" fill="freeze"/>
      <path d="M22 282 L22 302 L42 302"/>
    </g>
    <!-- top-left corner bracket -->
    <g stroke="#4f9eff" stroke-width="1" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.4" dur="0.5s" begin="0.8s" fill="freeze"/>
      <path d="M22 18 L22 38"/>
      <path d="M22 18 L42 18"/>
    </g>
    <!-- bottom-right corner bracket -->
    <g stroke="#4f9eff" stroke-width="1" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.4" dur="0.5s" begin="1.1s" fill="freeze"/>
      <path d="M878 282 L878 302"/>
      <path d="M858 302 L878 302"/>
    </g>

    <!-- ── Right side: animated dots / signal ── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
      <circle cx="844" cy="247" r="5" fill="none" stroke="#4f9eff" stroke-width="1">
        <animate attributeName="r" values="5;12;5" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="844" cy="247" r="5" fill="#4f9eff">
        <animate attributeName="r" values="5;4;5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="844" y="268" font-family="'Courier New', monospace" font-size="9" fill="#4f9eff" text-anchor="middle">available</text>
    </g>

  </g>
</svg>
